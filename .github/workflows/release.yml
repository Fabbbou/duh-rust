name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — also covers WSL (WSL runs native Linux binaries)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          # Linux ARM64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-latest
          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      # Cross-compile aarch64 Linux via taiki-e action (handles toolchain + C cross).
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: duh
          target: ${{ matrix.target }}
          archive: duh-$target
          tar: unix
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: refs/tags/${{ github.event.inputs.tag || github.ref_name }}
