name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Create the GitHub Release first so the parallel build jobs have a single,
  # already-existing target to upload to (avoids the "release not found" race
  # when matrix jobs each try to create it).
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
                 --title "$GITHUB_REF_NAME" --generate-notes

  build:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — also covers WSL (WSL runs native Linux binaries)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          # Linux ARM64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-latest
          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      # Cross-compile aarch64 Linux via taiki-e action (handles toolchain + C cross).
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: duh
          target: ${{ matrix.target }}
          archive: duh-$target
          tar: unix
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
